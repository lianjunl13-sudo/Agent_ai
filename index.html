<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术论文检索助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        :root {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f9fafb;
            --bg-hover: #f0f0f0;
            --bg-card: #ffffff;
            --text-primary: #1a1a2e;
            --text-secondary: #4b5563;
            --text-tertiary: #9ca3af;
            --text-placeholder: #9ca3af;
            --border-color: #e5e7eb;
            --border-focus: #4f46e5;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --accent-light: #eef2ff;
            --accent-bg: rgba(79, 70, 229, 0.08);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --sidebar-bg: #f8fafc;
            --sidebar-hover: #e2e8f0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #1a2332;
            --bg-hover: #252d3d;
            --bg-card: #1e293b;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --text-placeholder: #64748b;
            --border-color: #334155;
            --border-focus: #818cf8;
            --accent-color: #818cf8;
            --accent-hover: #6366f1;
            --accent-light: #1e1b4b;
            --accent-bg: rgba(129, 140, 248, 0.15);
            --success-color: #34d399;
            --warning-color: #fbbf24;
            --error-color: #f87171;
            --sidebar-bg: #0c1222;
            --sidebar-hover: #1e293b;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 20px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: all var(--transition);
            z-index: 20;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
        }

        .new-chat-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-color);
        }

        .new-chat-btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
        }

        .chat-item:hover { background: var(--sidebar-hover); color: var(--text-primary); }
        .chat-item.active {
            background: var(--accent-light);
            color: var(--accent-color);
            font-weight: 500;
        }

        .chat-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item-delete {
            opacity: 0;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all var(--transition);
            flex-shrink: 0;
        }

        .chat-item:hover .chat-item-delete { opacity: 0.6; }
        .chat-item-delete:hover { opacity: 1 !important; color: #ef4444; background: rgba(239,68,68,0.1); }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
        }

        .theme-toggle {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all var(--transition);
        }

        .theme-toggle:hover { background: var(--bg-hover); }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            position: relative;
        }

        .chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sidebar-toggle {
            display: none;
            width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .content-area::-webkit-scrollbar { width: 5px; }
        .content-area::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 5px;
        }

        /* Form Card */
        .form-card {
            max-width: 640px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .form-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-bg);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--accent-color);
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .form-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label .required {
            color: var(--error-color);
        }

        .form-label .optional {
            color: var(--text-tertiary);
            font-weight: 400;
            font-size: 12px;
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .dark .form-input:focus,
        .dark .form-select:focus,
        .dark .form-textarea:focus {
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        }

        .form-input::placeholder,
        .form-textarea::placeholder {
            color: var(--text-placeholder);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 480px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .submit-btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--accent-color);
            color: white;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition);
            margin-top: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .submit-btn .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Results */
        .results-area {
            max-width: 800px;
            margin: 0 auto;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .result-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-bg);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .result-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-meta {
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .result-content {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .result-content p { margin-bottom: 10px; }
        .result-content p:last-child { margin-bottom: 0; }

        .result-content pre {
            background: #1a1b26;
            border-radius: var(--radius-md);
            padding: 16px;
            overflow-x: auto;
            margin: 12px 0;
            position: relative;
        }

        .result-content pre code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .result-content code:not(pre code) {
            background: var(--bg-tertiary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        .result-content ul, .result-content ol {
            margin: 10px 0;
            padding-left: 24px;
        }

        .result-content li { margin: 4px 0; }

        .result-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 13px;
        }

        .result-content th, .result-content td {
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            text-align: left;
        }

        .result-content th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }

        .result-content blockquote {
            border-left: 3px solid var(--accent-color);
            padding: 8px 16px;
            margin: 12px 0;
            color: var(--text-secondary);
            background: var(--bg-tertiary);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .result-content a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .result-content a:hover { text-decoration: underline; }

        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 4px;
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            cursor: pointer;
            transition: all var(--transition);
            opacity: 0;
        }

        .result-content pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        /* Progress */
        .progress-area {
            max-width: 640px;
            margin: 0 auto 20px;
        }

        .progress-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .progress-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .progress-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .progress-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .progress-steps {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .progress-step {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .progress-step.active {
            background: var(--accent-bg);
            color: var(--accent-color);
        }

        .progress-step.completed {
            color: var(--success-color);
        }

        .progress-step-icon {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .progress-step.completed .progress-step-icon::before {
            content: "✓";
        }

        .progress-step.active .progress-step-icon::before {
            content: "●";
        }

        .progress-step.pending .progress-step-icon::before {
            content: "○";
            color: var(--text-tertiary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 13px;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                width: 280px;
                transition: left var(--transition);
            }
            .sidebar.open { left: 0; }
            .sidebar-toggle { display: flex; }
            .content-area { padding: 16px; }
            .form-card { padding: 20px; }
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 15;
        }
        .sidebar-overlay.show { display: block; }
    </style>
</head>
<body class="dark">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <div class="logo-icon">📚</div>
                <span class="logo-text">论文检索助手</span>
            </div>
            <button class="new-chat-btn" onclick="newSearch()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                新检索
            </button>
        </div>
        <div class="chat-list" id="historyList"></div>
        <div class="sidebar-footer">
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">☀️</span>
                <span id="themeLabel">浅色模式</span>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <header class="chat-header">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <span class="chat-header-title" id="pageTitle">论文检索</span>
            <div style="width:36px"></div>
        </header>

        <div class="content-area" id="contentArea">
            <!-- Form View -->
            <div id="formView">
                <div class="form-card">
                    <div class="form-header">
                        <div class="form-icon">🔍</div>
                        <div>
                            <div class="form-title">开始：论文检索需求</div>
                            <div class="form-subtitle">输入研究主题、年份、任务类型和检索约束</div>
                        </div>
                    </div>

                    <form id="searchForm" onsubmit="submitSearch(event)">
                        <!-- 研究主题 -->
                        <div class="form-group">
                            <label class="form-label">
                                <span>{x}</span> research_topic <span class="required">必填</span>
                            </label>
                            <textarea
                                class="form-textarea"
                                name="research_topic"
                                placeholder="请输入研究主题，例如：大语言模型幻觉问题"
                                required
                                rows="3"
                            ></textarea>
                        </div>

                        <!-- 任务类型 + 最大返回数 -->
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">
                                    <span>{x}</span> task_type <span class="required">必填</span>
                                </label>
                                <select class="form-select" name="task_type" required>
                                    <option value="快速综述">快速综述</option>
                                    <option value="精读推荐">精读推荐</option>
                                    <option value="Related Work">Related Work</option>
                                    <option value="方法对比">方法对比</option>
                                    <option value="找代码/数据集">找代码/数据集</option>
                                    <option value="复现调研">复现调研</option>
                                    <option value="创新点挖掘">创新点挖掘</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">
                                    <span>{x}</span> max_results <span class="required">必填</span>
                                </label>
                                <input
                                    type="number"
                                    class="form-input"
                                    name="max_results"
                                    value="5"
                                    min="1"
                                    max="20"
                                    required
                                >
                            </div>
                        </div>

                        <!-- 起始年份 -->
                        <div class="form-group">
                            <label class="form-label">
                                <span>{x}</span> year_from <span class="optional">可选</span>
                            </label>
                            <input
                                type="text"
                                class="form-input"
                                name="year_from"
                                placeholder="例如 2022；留空则不限"
                            >
                            <div class="form-hint">留空则不限制起始年份</div>
                        </div>

                        <!-- 检索源 + 输出语言 -->
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">
                                    <span>{x}</span> preferred_sources <span class="required">必填</span>
                                </label>
                                <select class="form-select" name="preferred_sources" required>
                                    <option value="arXiv + Semantic Scholar">arXiv + Semantic Scholar</option>
                                    <option value="arXiv only">arXiv only</option>
                                    <option value="Semantic Scholar only">Semantic Scholar only</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">
                                    <span>{x}</span> output_language <span class="required">必填</span>
                                </label>
                                <select class="form-select" name="output_language" required>
                                    <option value="中文">中文</option>
                                    <option value="English">English</option>
                                    <option value="中英双语">中英双语</option>
                                </select>
                            </div>
                        </div>

                        <!-- 额外约束 -->
                        <div class="form-group">
                            <label class="form-label">
                                <span>{x}</span> custom_constraints <span class="optional">可选</span>
                            </label>
                            <textarea
                                class="form-textarea"
                                name="custom_constraints"
                                placeholder="例如：只要顶会/必须有代码/偏向综述/排除医学"
                                rows="2"
                            ></textarea>
                            <div class="form-hint">添加额外的检索约束条件</div>
                        </div>

                        <button type="submit" class="submit-btn" id="submitBtn">
                            <span>开始检索</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Progress View -->
            <div id="progressView" style="display:none">
                <div class="progress-area">
                    <div class="progress-card">
                        <div class="progress-header">
                            <div class="progress-spinner"></div>
                            <span class="progress-title">正在检索论文...</span>
                        </div>
                        <div class="progress-steps" id="progressSteps">
                            <div class="progress-step active" data-step="start">
                                <span class="progress-step-icon"></span>
                                <span>接收参数 · 论文检索需求</span>
                            </div>
                            <div class="progress-step pending" data-step="plan">
                                <span class="progress-step-icon"></span>
                                <span>LLM 规划迭代检索词</span>
                            </div>
                            <div class="progress-step pending" data-step="retrieve">
                                <span class="progress-step-icon"></span>
                                <span>迭代检索 · 多查询 × 多来源</span>
                            </div>
                            <div class="progress-step pending" data-step="synthesize">
                                <span class="progress-step-icon"></span>
                                <span>生成综述报告</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Results View -->
            <div id="resultsView" style="display:none">
                <div class="results-area" id="resultsContainer"></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const API_KEY = 'app-b1Fcn7EkUXJH6JaJPwDjFzsI';
        const API_BASE = 'https://api.dify.ai/v1';

        let searchHistory = [];
        let abortController = null;
        let liveResultContent = '';

        marked.setOptions({ breaks: true, gfm: true });

        const renderer = new marked.Renderer();
        renderer.code = function({ text, lang }) {
            const validLang = lang && hljs.getLanguage(lang) ? lang : 'plaintext';
            const highlighted = hljs.highlight(text, { language: validLang }).value;
            return `<pre><div class="copy-btn" onclick="copyCode(this)">复制</div><code class="hljs language-${validLang}">${highlighted}</code></pre>`;
        };
        marked.use({ renderer });

        function init() {
            loadHistory();
            renderHistory();
            updateThemeUI();
        }

        function loadHistory() {
            try {
                const saved = localStorage.getItem('dify_search_history_v2');
                if (saved) searchHistory = JSON.parse(saved);
            } catch (e) {}
        }

        function saveHistory() {
            localStorage.setItem('dify_search_history_v2', JSON.stringify(searchHistory));
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            if (searchHistory.length === 0) {
                list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-tertiary);font-size:13px;">暂无检索记录</div>';
                return;
            }

            list.innerHTML = searchHistory.slice().reverse().map((item, idx) => {
                const realIdx = searchHistory.length - 1 - idx;
                const icon = item.status === 'succeeded' ? '✅' : item.status === 'failed' ? '❌' : '⏳';
                const title = item.topic.length > 20 ? item.topic.slice(0, 20) + '...' : item.topic;
                return `
                    <div class="chat-item" onclick="loadHistoryItem(${realIdx})">
                        <span style="flex-shrink:0;">${icon}</span>
                        <span class="chat-item-title">${escapeHtml(title)}</span>
                        <button class="chat-item-delete" onclick="event.stopPropagation();deleteHistory(${realIdx})" title="删除">×</button>
                    </div>
                `;
            }).join('');
        }

        function newSearch() {
            showView('formView');
            document.getElementById('searchForm').reset();
            document.getElementById('pageTitle').textContent = '论文检索';
            liveResultContent = '';
            closeSidebar();
        }

        function showView(viewId) {
            ['formView', 'progressView', 'resultsView'].forEach(id => {
                document.getElementById(id).style.display = id === viewId ? 'block' : 'none';
            });
        }

        let progressState = { start: false, plan: false, retrieve: false, synthesize: false };
        let currentProgressStep = 'start';

        function resetProgress() {
            progressState = { start: false, plan: false, retrieve: false, synthesize: false };
            currentProgressStep = 'start';
            ['start', 'plan', 'retrieve', 'synthesize'].forEach(s => {
                const el = document.querySelector(`[data-step="${s}"]`);
                if (el) { el.classList.remove('active', 'completed'); el.classList.add('pending'); }
            });
            const startEl = document.querySelector('[data-step="start"]');
            if (startEl) { startEl.classList.remove('pending'); startEl.classList.add('active'); }
        }

        function markStepComplete(step) {
            if (progressState[step]) return;
            progressState[step] = true;
            const el = document.querySelector(`[data-step="${step}"]`);
            if (el) { el.classList.remove('active', 'pending'); el.classList.add('completed'); }

            // Activate next step
            const order = ['start', 'plan', 'retrieve', 'synthesize'];
            const idx = order.indexOf(step);
            if (idx >= 0 && idx < order.length - 1) {
                const next = order[idx + 1];
                const nextEl = document.querySelector(`[data-step="${next}"]`);
                if (nextEl) { nextEl.classList.remove('pending'); nextEl.classList.add('active'); }
                currentProgressStep = next;
            }
        }

        // Show live streaming result alongside progress
        function showLiveResult() {
            showView('resultsView');
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <div class="progress-spinner"></div>
                            <span style="font-size:14px;color:var(--text-secondary);">正在生成报告...</span>
                        </div>
                    </div>
                    <div class="result-content" id="liveContent"></div>
                </div>
            `;
        }

        function updateLiveContent(text) {
            const el = document.getElementById('liveContent');
            if (el && text != null && text !== '') {
                el.innerHTML = marked.parse(String(text));
                hljs.highlightAll();
                document.getElementById('contentArea').scrollTop = document.getElementById('contentArea').scrollHeight;
            }
        }

        async function submitSearch(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);

            const inputs = {
                research_topic: formData.get('research_topic').trim(),
                task_type: formData.get('task_type'),
                max_results: parseInt(formData.get('max_results')),
                year_from: formData.get('year_from')?.trim() || '',
                preferred_sources: formData.get('preferred_sources'),
                output_language: formData.get('output_language'),
                custom_constraints: formData.get('custom_constraints')?.trim() || '',
            };

            if (!inputs.research_topic) return;

            document.getElementById('pageTitle').textContent = inputs.research_topic;
            showView('progressView');
            resetProgress();

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span>检索中...</span>';

            abortController = new AbortController();
            liveResultContent = '';
            let finalOutput = '';
            let workflowStatus = '';
            let workflowError = '';
            let hasLiveView = false;

            try {
                const response = await fetch(`${API_BASE}/workflows/run`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        inputs,
                        response_mode: 'streaming',
                        user: getUserId(),
                    }),
                    signal: abortController.signal,
                });

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.message || `请求失败 (${response.status})`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop() || '';

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));
                            const evt = data.event;

                            // Progress tracking
                            if (evt === 'node_started' || evt === 'node_finished') {
                                const nodeId = data.data?.node_id;
                                const nodeTitle = data.data?.title || '';
                                const isFinished = evt === 'node_finished';

                                if (nodeId === 'start') {
                                    if (isFinished) markStepComplete('start');
                                } else if (nodeId === 'plan_queries') {
                                    if (isFinished) markStepComplete('plan');
                                } else if (nodeId === 'iter_retrieve') {
                                    if (isFinished) markStepComplete('retrieve');
                                } else if (nodeTitle.includes('综述') || nodeTitle.includes('报告') || nodeTitle.includes('synthesize') || nodeId?.startsWith('178')) {
                                    // end node or synthesis node
                                    if (isFinished) markStepComplete('synthesize');
                                }
                            }

                            // Streaming text chunks
                            if (evt === 'text_chunk') {
                                liveResultContent += (data.data?.text || '');
                                if (!hasLiveView) {
                                    showLiveResult();
                                    hasLiveView = true;
                                }
                                updateLiveContent(liveResultContent);
                            }

                            // Workflow finished
                            if (evt === 'workflow_finished') {
                                // Mark all steps complete
                                markStepComplete('synthesize');

                                workflowStatus = data.data?.status || (data.data?.error ? 'failed' : 'succeeded');
                                workflowError = data.data?.error || '';

                                // Try multiple output field names
                                const outs = data.data?.outputs || {};
                                if (outs.markdown_result) finalOutput = outs.markdown_result;
                                else if (outs.text) finalOutput = outs.text;
                                else if (outs.answer) finalOutput = outs.answer;
                                else if (outs.result) finalOutput = outs.result;
                                else if (typeof outs === 'string') finalOutput = outs;
                                else {
                                    const keys = Object.keys(outs);
                                    if (keys.length === 1) finalOutput = outs[keys[0]];
                                    else if (keys.length > 1) finalOutput = liveResultContent;
                                    else finalOutput = liveResultContent;
                                }
                            }
                        } catch (e) {}
                    }
                }

                // Save to history
                const historyItem = {
                    topic: inputs.research_topic,
                    taskType: inputs.task_type,
                    timestamp: Date.now(),
                    result: finalOutput,
                    status: workflowStatus,
                    error: workflowError,
                };
                searchHistory.push(historyItem);
                saveHistory();
                renderHistory();

                // Show final results
                showResults(finalOutput, inputs, workflowStatus, workflowError);

            } catch (error) {
                if (error.name !== 'AbortError') {
                    showView('resultsView');
                    const errMsg = error.message || '';
                    const isSemanticScholar = errMsg.includes('semanticscholar') || errMsg.includes('max retries');
                    document.getElementById('resultsContainer').innerHTML = `
                        <div class="result-card">
                            <div class="result-header">
                                <div class="result-icon">⚠️</div>
                                <div><div class="result-title">${isSemanticScholar ? 'Semantic Scholar 暂时不可用' : '请求失败'}</div></div>
                            </div>
                            <div class="result-content">
                                <p style="color:var(--error-color);">${escapeHtml(errMsg)}</p>
                                ${isSemanticScholar ? `
                                <div style="background:var(--accent-bg);border-radius:8px;padding:12px;margin-top:12px;">
                                    <p style="color:var(--accent-color);font-weight:500;margin-bottom:8px;">💡 建议：</p>
                                    <ul style="margin:0;padding-left:18px;color:var(--text-secondary);font-size:13px;line-height:1.8;">
                                        <li>将<strong>偏好数据源</strong>改为 <strong>arXiv only</strong> 重试</li>
                                        <li>Semantic Scholar 对免费 API 有频率限制，高峰期容易超时</li>
                                        <li>稍等 1-2 分钟后重试</li>
                                    </ul>
                                </div>
                                ` : `<p style="color:var(--text-tertiary);">请检查网络连接或稍后重试</p>`}
                            </div>
                        </div>
                    `;
                }
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>开始检索</span>';
                abortController = null;
            }
        }

        function showResults(content, inputs, status, errorMsg) {
            showView('resultsView');
            const container = document.getElementById('resultsContainer');

            const metaInfo = `
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
                    <span style="padding:4px 10px;background:var(--accent-bg);color:var(--accent-color);border-radius:12px;font-size:12px;">${escapeHtml(inputs.task_type)}</span>
                    <span style="padding:4px 10px;background:var(--bg-tertiary);color:var(--text-secondary);border-radius:12px;font-size:12px;">${inputs.max_results} 篇</span>
                    <span style="padding:4px 10px;background:var(--bg-tertiary);color:var(--text-secondary);border-radius:12px;font-size:12px;">${escapeHtml(inputs.preferred_sources)}</span>
                    <span style="padding:4px 10px;background:var(--bg-tertiary);color:var(--text-secondary);border-radius:12px;font-size:12px;">${escapeHtml(inputs.output_language)}</span>
                </div>
            `;

            const statusBadge = status === 'succeeded'
                ? '<span style="color:var(--success-color);font-size:12px;">✅ 检索完成</span>'
                : status === 'failed'
                ? '<span style="color:var(--error-color);font-size:12px;">⚠️ 部分失败</span>'
                : '<span style="color:var(--warning-color);font-size:12px;">⏳ 运行中</span>';

            const errorBlock = errorMsg ? `
                <div style="margin:12px 0;padding:12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:8px;">
                    <p style="font-size:12px;color:var(--error-color);margin-bottom:4px;">⚠️ 检索过程中遇到错误</p>
                    <p style="font-size:12px;color:var(--text-tertiary);word-break:break-all;">${escapeHtml(errorMsg)}</p>
                </div>
            ` : '';

            container.innerHTML = `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-icon">📚</div>
                        <div style="flex:1">
                            <div class="result-title">${escapeHtml(inputs.research_topic)}</div>
                            <div class="result-meta">${new Date().toLocaleString()} ${statusBadge}</div>
                        </div>
                    </div>
                    ${metaInfo}
                    ${errorBlock}
                    <div class="result-content">${content ? marked.parse(content) : '<p style="color:var(--text-tertiary);">暂无输出内容 — 检索源可能暂时不可用</p>'}</div>
                </div>
            `;

            hljs.highlightAll();
        }

        function loadHistoryItem(index) {
            const item = searchHistory[index];
            if (!item) return;
            document.getElementById('pageTitle').textContent = item.topic;
            showResults(item.result, {
                research_topic: item.topic,
                task_type: item.taskType,
                max_results: 5,
                preferred_sources: 'arXiv + Semantic Scholar',
                output_language: '中文',
            }, item.status, item.error);
            closeSidebar();
        }

        function deleteHistory(index) {
            if (confirm('确认删除这条检索记录？')) {
                searchHistory.splice(index, 1);
                saveHistory();
                renderHistory();
            }
        }

        function copyCode(btn) {
            const pre = btn.parentElement;
            const code = pre.querySelector('code');
            navigator.clipboard.writeText(code.textContent).then(() => {
                btn.textContent = '已复刻!';
                setTimeout(() => btn.textContent = '复制', 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function getUserId() {
            let id = localStorage.getItem('dify_user_id_v2');
            if (!id) {
                id = 'user_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
                localStorage.setItem('dify_user_id_v2', id);
            }
            return id;
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            localStorage.setItem('dify_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            updateThemeUI();
        }

        function updateThemeUI() {
            const isDark = document.body.classList.contains('dark');
            document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
            document.getElementById('themeLabel').textContent = isDark ? '浅色模式' : '深色模式';
        }

        (function loadTheme() {
            const saved = localStorage.getItem('dify_theme');
            if (saved === 'light') document.body.classList.remove('dark');
            else document.body.classList.add('dark');
        })();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('show');
        }

        init();
    </script>
</body>
</html>
